<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LimeVideo Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* LimeVideo.css Temelleri & Özel Yeşil-Siyah Tema */
        :root {
            --limevideo-green: #00ff41;
            --limevideo-red: #ff3e3e;
            --limevideo-black: #0a0a0a;
            --limevideo-dark-grey: #1a1a1a;
            --limevideo-light-grey: #2a2a2a;
        }

        body {
            background-color: var(--limevideo-black);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .limevideo-gradient-text {
            background: linear-gradient(90deg, #00ff41, #008f11);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .limevideo-btn-primary {
            background-color: var(--limevideo-green);
            color: black;
            font-weight: bold;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .limevideo-btn-primary:hover {
            box-shadow: 0 0 15px var(--limevideo-green);
            transform: translateY(-2px);
        }

        .limevideo-card {
            background: var(--limevideo-dark-grey);
            border: 1px solid var(--limevideo-light-grey);
            border-radius: 12px;
            overflow: hidden;
        }

        .limevideo-input {
            background: var(--limevideo-light-grey);
            border: 1px solid #333;
            color: white;
            padding: 0.8rem;
            border-radius: 8px;
            width: 100%;
        }

        .limevideo-input:focus {
            outline: none;
            border-color: var(--limevideo-green);
        }

        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--limevideo-light-grey);
        }

        .page-content {
            padding-top: 70px;
            min-height: 100vh;
        }

        .nav-link {
            color: #888;
            transition: color 0.3s;
            cursor: pointer;
        }

        .nav-link.active {
            color: var(--limevideo-green);
        }

        .video-placeholder {
            background: linear-gradient(270deg, #1a1a1a, #2a2a2a, #1a1a1a);
            background-size: 400% 400%;
            animation: pulse 3s ease infinite;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        @keyframes pulse {
            0% { background-position: 0% 50% }
            50% { background-position: 100% 50% }
            100% { background-position: 0% 50% }
        }

        /* Modal Backdrop */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-container {
            width: 90%;
            max-width: 500px;
            background: var(--limevideo-dark-grey);
            border: 1px solid var(--limevideo-green);
            border-radius: 16px;
            padding: 24px;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-container {
            transform: translateY(0);
        }

        /* Status Toast / Popup */
        .status-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            z-index: 3000;
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 14px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .status-toast.active {
            transform: translateX(-50%) translateY(0);
        }

        .status-toast.success {
            background: var(--limevideo-green);
            color: black;
        }

        .status-toast.error {
            background: var(--limevideo-red);
            color: white;
        }

        .cover-photo {
            height: 120px;
            background: linear-gradient(45deg, #050505, #1a1a1a);
            position: relative;
            border-bottom: 2px solid #222;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .stats-card-row-item {
            background: linear-gradient(145deg, #1a1a1a, #111111);
            border: 1px solid #222;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            padding: 8px 12px;
            gap: 8px;
            border-radius: 12px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <!-- Durum Bildirimi (Toast) -->
    <div id="status-toast" class="status-toast">
        <i id="status-icon" class="fa-solid"></i>
        <span id="status-message"></span>
    </div>

    <!-- Sabit Header -->
    <header class="fixed-header h-16 flex items-center justify-between px-4">
        <div class="flex items-center gap-2 cursor-pointer" onclick="app.navigate('gallery')">
            <div class="w-8 h-8 bg-[#00ff41] rounded flex items-center justify-center">
                <i class="fa-solid fa-bolt text-black"></i>
            </div>
            <span class="text-xl font-black tracking-tighter limevideo-gradient-text">LIMEVIDEO</span>
        </div>
        <nav class="flex gap-6 text-xl">
            <i class="fa-solid fa-house nav-link" id="nav-gallery" onclick="app.navigate('gallery')"></i>
            <i class="fa-solid fa-user nav-link" id="nav-user" onclick="app.navigate('user')"></i>
            <i class="fa-solid fa-right-to-bracket nav-link" id="nav-auth" onclick="app.navigate('auth')"></i>
        </nav>
    </header>

    <main id="app-root" class="page-content">
        <!-- İçerik buraya render edilir -->
    </main>

    <!-- Profil Düzenleme Modalı -->
    <div id="edit-modal" class="modal-overlay" onclick="app.closeEditModal()">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black uppercase italic tracking-tighter">Profili Düzenle</h3>
                <i class="fa-solid fa-xmark cursor-pointer text-gray-500 hover:text-white" onclick="app.closeEditModal()"></i>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 mb-1 block tracking-widest">Görünen Ad</label>
                    <input type="text" id="edit-name" class="limevideo-input" placeholder="Adınızı girin...">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 mb-1 block tracking-widest">Profil Resmi (URL)</label>
                    <input type="text" id="edit-avatar" class="limevideo-input" placeholder="https://...">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 mb-1 block tracking-widest">Kapak Resmi (URL)</label>
                    <input type="text" id="edit-cover" class="limevideo-input" placeholder="https://...">
                </div>
                <div class="pt-4 flex gap-3">
                    <button onclick="app.saveProfile()" class="flex-1 limevideo-btn-primary uppercase text-xs">Kaydet</button>
                    <button onclick="app.closeEditModal()" class="flex-1 bg-transparent border border-gray-700 uppercase text-xs rounded-lg">İptal</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const app = {
            state: {
                currentPage: 'auth',
                isOwnProfile: true,
                user: {
                    name: "LimeVideo Developer",
                    joined: "Nisan 2024",
                    stats: { videoCount: 12, totalViews: "45.2K", followers: "1.8K" }
                }
            },

            init() {
                this.navigate('auth');
            },

            // Bildirim Gösterme Fonksiyonu
            showStatus(message, type = 'success') {
                const toast = document.getElementById('status-toast');
                const icon = document.getElementById('status-icon');
                const msgSpan = document.getElementById('status-message');

                toast.className = `status-toast active ${type}`;
                msgSpan.innerText = message;
                icon.className = type === 'success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-triangle-exclamation';

                setTimeout(() => {
                    toast.classList.remove('active');
                }, 3000);
            },

            navigate(page) {
                this.state.currentPage = page;
                this.render();
                window.scrollTo(0, 0);
                document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
                const activeNav = document.getElementById(`nav-${page}`);
                if(activeNav) activeNav.classList.add('active');
            },

            // Auth Login Örneği
            handleLogin() {
                const email = document.getElementById('login-email').value;
                if(!email.includes('@')) {
                    this.showStatus('Geçerli bir e-posta adresi giriniz!', 'error');
                    return;
                }
                this.showStatus('Başarıyla giriş yapıldı. Hoş geldin!');
                setTimeout(() => this.navigate('gallery'), 1000);
            },

            openEditModal() {
                document.getElementById('edit-name').value = this.state.user.name;
                document.getElementById('edit-modal').classList.add('active');
            },

            closeEditModal() {
                document.getElementById('edit-modal').classList.remove('active');
            },

            saveProfile() {
                const newName = document.getElementById('edit-name').value;
                if(newName.trim().length < 3) {
                    this.showStatus('İsim en az 3 karakter olmalıdır!', 'error');
                    return;
                }

                // Başarı simülasyonu
                this.state.user.name = newName;
                this.showStatus('Profil bilgileriniz güncellendi.');
                this.closeEditModal();
                this.render();
            },

            render() {
                const root = document.getElementById('app-root');
                switch(this.state.currentPage) {
                    case 'auth': root.innerHTML = this.pages.auth(); break;
                    case 'gallery': root.innerHTML = this.pages.gallery(); break;
                    case 'user': root.innerHTML = this.pages.user(); break;
                }
            },

            pages: {
                auth: () => `
                    <div class="flex flex-col items-center justify-center px-6 py-12">
                        <div class="w-full max-w-md p-8 limevideo-card">
                            <h2 class="text-3xl font-bold mb-6 text-center italic tracking-tighter uppercase">Giriş Yap</h2>
                            <div class="space-y-4">
                                <input type="email" id="login-email" class="limevideo-input" placeholder="E-posta">
                                <input type="password" class="limevideo-input" placeholder="Şifre">
                                <button onclick="app.handleLogin()" class="w-full limevideo-btn-primary mt-4 uppercase tracking-widest">Sisteme Gir</button>
                            </div>
                            <p class="text-[10px] text-gray-600 mt-6 text-center uppercase tracking-widest">Şifremi unuttum / Kayıt ol</p>
                        </div>
                    </div>
                `,

                gallery: () => `
                    <div class="p-4">
                        <h1 class="text-2xl font-black italic mb-6 tracking-tighter uppercase">Popüler Videolar</h1>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${[1,2,3,4,5,6].map(i => `
                                <div class="limevideo-card cursor-pointer group">
                                    <div class="video-placeholder">
                                        <i class="fa-solid fa-play text-4xl opacity-0 group-hover:opacity-100 transition-opacity"></i>
                                    </div>
                                    <div class="p-4">
                                        <h3 class="font-bold text-lg mb-1">LimeVideo #${i}</h3>
                                        <p class="text-[10px] text-gray-500 uppercase font-bold">@creator_limevideo • 12K İzlenme</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `,

                user: () => {
                    const u = app.state.user;
                    const isOwn = app.state.isOwnProfile;
                    return `
                        <div class="relative">
                            <div class="cover-photo"></div>
                            <div class="px-4 -mt-10 flex flex-col items-center">
                                <div class="w-24 h-24 rounded-full border-4 border-black bg-[#111] mb-4 flex items-center justify-center overflow-hidden">
                                    <i class="fa-solid fa-user-astronaut text-4xl text-[#00ff41]"></i>
                                </div>
                                <h2 class="text-2xl font-black italic uppercase tracking-tighter limevideo-gradient-text">${u.name}</h2>
                                <div class="mt-6 flex gap-2">
                                    ${isOwn ?
                                        `<button onclick="app.openEditModal()" class="bg-[#222] border border-[#444] px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-[#333]">Düzenle</button>` :
                                        `<button onclick="app.showStatus('Takip edildi!')" class="limevideo-btn-primary px-8 py-2 rounded-full text-[10px] font-black uppercase tracking-widest">Takip Et</button>`
                                    }
                                </div>
                                <div class="flex gap-4 mt-8 w-full overflow-x-auto no-scrollbar">
                                    <div class="stats-card-row-item">
                                        <span class="text-lg font-black">${u.stats.videoCount}</span>
                                        <span class="text-[8px] text-gray-500 uppercase font-bold leading-none">Video</span>
                                    </div>
                                    <div class="stats-card-row-item">
                                        <span class="text-lg font-black">${u.stats.totalViews}</span>
                                        <span class="text-[8px] text-gray-500 uppercase font-bold leading-none">İzlenme</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
