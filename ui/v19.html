<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LimeVideo - Global Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --lime: #00ff41;
            --bg: #0a0a0a;
            --card: #121212;
            --card-hover: #1a1a1a;
            --border: rgba(255,255,255,0.08);
            --error: #ff3e3e;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- Global Loading Screen --- */
        #globalLoader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }
        .loader-hidden { opacity: 0; visibility: hidden; }

        /* Navbar & Chat Badge */
        .navbar {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .chat-trigger {
            position: relative;
            transition: all 0.2s;
        }
        .chat-trigger:hover { color: var(--lime); }
        .unread-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--lime);
            color: black;
            font-size: 9px;
            font-weight: 900;
            min-width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            border: 2px solid var(--bg);
        }

        /* Modal & Overlay */
        .modal-overlay {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            display: none;
            z-index: 9999;
        }

        .chat-panel {
            background: var(--card);
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            height: 80vh;
            width: 520px;
            max-width: 95vw;
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Chat Layout */
        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            background: #141414;
        }

        /* Message Bubbles */
        .message-row { display: flex; flex-direction: column; max-width: 85%; }
        .msg-own { align-self: flex-end; }
        .msg-other { align-self: flex-start; }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
            border: 1px solid var(--border);
        }
        .msg-own .msg-bubble {
            background: rgba(0, 255, 65, 0.05);
            border-color: rgba(0, 255, 65, 0.2);
            color: #eee;
            border-bottom-right-radius: 4px;
        }
        .msg-other .msg-bubble {
            background: #1a1a1a;
            color: #ccc;
            border-bottom-left-radius: 4px;
        }

        .msg-info {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            display: flex;
            gap: 8px;
            opacity: 0.5;
        }
        .msg-own .msg-info { justify-content: flex-end; }

        /* Confirmation Popup */
        .confirm-popup {
            position: absolute;
            inset: 0;
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        /* Custom Scrollbar */
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .chat-messages::-webkit-scrollbar-thumb:hover { background: var(--lime); }

        .input-box {
            background: #1c1c1c;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 16px;
            color: white;
            width: 100%;
            transition: all 0.2s;
        }
        .input-box:focus { outline: none; border-color: var(--lime); box-shadow: 0 0 10px rgba(0,255,65,0.1); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-animate { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body>

    <!-- Global Loader -->
    <div id="globalLoader">
        <div class="flex items-center gap-3 mb-4">
            <div class="w-8 h-8 bg-[#00ff41] rounded-lg flex items-center justify-center"><i class="fa-solid fa-play text-black text-xs"></i></div>
            <span class="font-black italic">LIMEVIDEO</span>
        </div>
        <div class="w-10 h-10 border-2 border-white/5 border-t-[#00ff41] rounded-full animate-spin"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar fixed top-0 left-0 right-0 h-16 px-8 flex items-center justify-between z-40">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-[#00ff41] rounded-lg flex items-center justify-center"><i class="fa-solid fa-play text-black text-xs"></i></div>
            <span class="text-xl font-black italic tracking-tighter uppercase">LIMEVIDEO</span>
        </div>

        <div class="flex items-center gap-6">
            <!-- Chat Trigger Button -->
            <button id="chatTrigger" class="chat-trigger p-2 text-gray-400">
                <i class="fa-solid fa-comment-dots text-xl"></i>
                <div id="unreadBadge" class="unread-badge">3</div>
            </button>

            <button id="uploadTrigger" class="bg-[#00ff41] text-black px-5 py-2 rounded-xl text-xs font-black uppercase">Upload</button>
            <div class="w-10 h-10 rounded-full border border-white/10 bg-gradient-to-br from-lime-500 to-green-800"></div>
        </div>
    </nav>

    <!-- Global Chat Modal -->
    <div id="chatModal" class="modal-overlay fixed inset-0 flex items-center justify-center">
        <div class="chat-panel relative">

            <!-- Safety Confirmation Popup (Hidden by default) -->
            <div id="confirmPopup" class="confirm-popup">
                <div class="w-16 h-16 bg-lime-500/10 rounded-2xl flex items-center justify-center mb-6">
                    <i class="fa-solid fa-shield-halved text-lime-500 text-2xl"></i>
                </div>
                <h3 class="text-xl font-black uppercase italic mb-2">Mesaj Sorumluluğu</h3>
                <p class="text-sm text-gray-400 mb-8 max-w-xs">Gönderdiğiniz mesajdan siz sorumlusunuz. Topluluk kurallarına uymayı kabul ediyor musunuz?</p>
                <div class="flex flex-col w-full gap-3">
                    <button id="confirmSend" class="bg-[#00ff41] text-black w-full py-4 rounded-2xl font-black uppercase text-xs">Evet, Gönder (Enter)</button>
                    <button id="cancelSend" class="text-gray-500 font-black uppercase text-[10px] tracking-widest hover:text-white transition-colors">Hayır, İptal Et (Esc)</button>
                </div>
            </div>

            <!-- Chat Header -->
            <div class="chat-header">
                <div>
                    <div class="flex items-center gap-2">
                        <h2 class="text-lg font-black uppercase italic tracking-tighter">Global Chat</h2>
                        <span class="px-2 py-0.5 bg-lime-500/10 text-lime-500 text-[9px] font-black rounded-full uppercase">Live</span>
                    </div>
                    <p class="text-[10px] text-gray-500 font-bold uppercase mt-1">LimeVideo topluluğu ile sohbet et.</p>
                </div>
                <button id="closeChat" class="w-10 h-10 rounded-full hover:bg-white/5 flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-xmark text-gray-500"></i>
                </button>
            </div>

            <!-- Messages Area -->
            <div id="chatMessages" class="chat-messages">
                <!-- Messages will be injected here -->
                <div class="flex flex-col items-center justify-center h-full opacity-20" id="emptyState">
                    <i class="fa-solid fa-comments text-5xl mb-4"></i>
                    <p class="text-xs font-bold uppercase">Henüz mesaj yok</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <div class="flex items-center gap-3">
                    <input type="text" id="chatInput" maxlength="500" placeholder="Topluluğa mesaj yaz..." class="input-box">
                    <button id="preSendBtn" class="w-12 h-12 bg-[#00ff41] text-black rounded-xl flex items-center justify-center transition-transform active:scale-90">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
                <div class="flex justify-between mt-3 px-1">
                    <span class="text-[9px] text-gray-600 font-bold uppercase tracking-wider">Shift + Enter for new line</span>
                    <span id="charCount" class="text-[9px] text-gray-600 font-bold uppercase tracking-wider">0 / 500</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- State & Mock Data ---
        const app = {
            currentUser: { name: 'Yigit Dev', username: '@yigitdev', id: 'u1' },
            unreadCount: 3,
            messages: [
                { id: 1, user: 'Arda', username: '@arda99', text: 'Yeni video harika olmuş dostum!', time: '12:45', isOwn: false },
                { id: 2, user: 'Selin', username: '@selin_design', text: 'Tasarım trendleri hakkında ne düşünüyorsunuz?', time: '12:48', isOwn: false },
                { id: 3, user: 'Yigit Dev', username: '@yigitdev', text: 'Selam herkese 👋 Akşam yeni yayın var.', time: '13:02', isOwn: true }
            ],
            pendingMessage: ""
        };

        // --- Selectors ---
        const chatModal = document.getElementById('chatModal');
        const chatTrigger = document.getElementById('chatTrigger');
        const closeChat = document.getElementById('closeChat');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const preSendBtn = document.getElementById('preSendBtn');
        const confirmPopup = document.getElementById('confirmPopup');
        const confirmSend = document.getElementById('confirmSend');
        const cancelSend = document.getElementById('cancelSend');
        const unreadBadge = document.getElementById('unreadBadge');
        const charCount = document.getElementById('charCount');

        // --- Functions ---

        const toggleChatModal = (show) => {
            if (show) {
                chatModal.style.display = 'flex';
                app.updateChatUnreadCount(0);
                app.renderChatMessages();
                setTimeout(() => chatInput.focus(), 100);
            } else {
                chatModal.style.display = 'none';
                app.cancelChatConfirmation();
            }
        };

        app.updateChatUnreadCount = (count) => {
            app.unreadCount = count;
            unreadBadge.innerText = count > 99 ? '99+' : count;
            unreadBadge.style.display = count === 0 ? 'none' : 'flex';
        };

        app.renderChatMessages = () => {
            if (app.messages.length > 0) document.getElementById('emptyState').style.display = 'none';

            chatMessages.innerHTML = '';
            app.messages.forEach(msg => {
                const row = document.createElement('div');
                row.className = `message-row ${msg.isOwn ? 'msg-own' : 'msg-other'} msg-animate`;

                row.innerHTML = `
                    <div class="msg-info">
                        <span>${msg.user}</span>
                        <span class="opacity-50">${msg.username}</span>
                        <span>•</span>
                        <span>${msg.time}</span>
                    </div>
                    <div class="msg-bubble">
                        ${msg.text}
                    </div>
                `;
                chatMessages.appendChild(row);
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        };

        app.queueChatMessage = () => {
            const val = chatInput.value.trim();
            if (!val) return;
            app.pendingMessage = val;
            confirmPopup.style.display = 'flex';
        };

        app.confirmChatMessage = () => {
            const now = new Date();
            const timeStr = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');

            app.messages.push({
                id: Date.now(),
                user: app.currentUser.name,
                username: app.currentUser.username,
                text: app.pendingMessage,
                time: timeStr,
                isOwn: true
            });

            chatInput.value = "";
            app.pendingMessage = "";
            app.cancelChatConfirmation();
            app.renderChatMessages();
        };

        app.cancelChatConfirmation = () => {
            confirmPopup.style.display = 'none';
        };

        // --- Event Listeners ---

        chatTrigger.onclick = () => toggleChatModal(true);
        closeChat.onclick = () => toggleChatModal(false);
        chatModal.onclick = (e) => { if(e.target === chatModal) toggleChatModal(false); };

        preSendBtn.onclick = app.queueChatMessage;
        confirmSend.onclick = app.confirmChatMessage;
        cancelSend.onclick = app.cancelChatConfirmation;

        chatInput.oninput = (e) => {
            charCount.innerText = `${e.target.value.length} / 500`;
        };

        chatInput.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                app.queueChatMessage();
            }
        };

        window.onkeydown = (e) => {
            if (confirmPopup.style.display === 'flex') {
                if (e.key === 'Enter' || e.key.toLowerCase() === 'e') app.confirmChatMessage();
                if (e.key === 'Escape' || e.key.toLowerCase() === 'h') app.cancelChatConfirmation();
            } else if (e.key === 'Escape' && chatModal.style.display === 'flex') {
                toggleChatModal(false);
            }
        };

        // --- Init ---
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('globalLoader').classList.add('loader-hidden');
            }, 800);
            app.updateChatUnreadCount(3);
        };
    </script>
</body>
</html>
