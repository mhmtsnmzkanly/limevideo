<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LimeVideo Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* LimeVideo.css Temelleri & Özel Yeşil-Siyah Tema */
        :root {
            --limevideo-green: #00ff41;
            --limevideo-black: #0a0a0a;
            --limevideo-dark-grey: #1a1a1a;
            --limevideo-light-grey: #2a2a2a;
        }

        body {
            background-color: var(--limevideo-black);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .limevideo-gradient-text {
            background: linear-gradient(90deg, #00ff41, #008f11);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .limevideo-btn-primary {
            background-color: var(--limevideo-green);
            color: black;
            font-weight: bold;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .limevideo-btn-primary:hover {
            box-shadow: 0 0 15px var(--limevideo-green);
            transform: translateY(-2px);
        }

        .limevideo-card {
            background: var(--limevideo-dark-grey);
            border: 1px solid var(--limevideo-light-grey);
            border-radius: 12px;
            overflow: hidden;
        }

        .limevideo-input {
            background: var(--limevideo-light-grey);
            border: 1px solid #333;
            color: white;
            padding: 0.8rem;
            border-radius: 8px;
            width: 100%;
        }

        .limevideo-input:focus {
            outline: none;
            border-color: var(--limevideo-green);
        }

        /* Video Preview Animation Placeholder */
        .video-placeholder {
            background: linear-gradient(270deg, #1a1a1a, #2a2a2a, #1a1a1a);
            background-size: 400% 400%;
            animation: pulse 3s ease infinite;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes pulse {
            0% { background-position: 0% 50% }
            50% { background-position: 100% 50% }
            100% { background-position: 0% 50% }
        }

        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--limevideo-light-grey);
        }

        .page-content {
            padding-top: 70px;
            min-height: 100vh;
        }

        /* Mobile First Navigation */
        .nav-link {
            color: #888;
            transition: color 0.3s;
            cursor: pointer;
        }

        .nav-link.active {
            color: var(--limevideo-green);
        }

        .comment-box {
            border-left: 2px solid var(--limevideo-green);
            background: rgba(0, 255, 65, 0.05);
        }

        .infinity-loader {
            height: 4px;
            background: var(--limevideo-green);
            width: 0%;
            transition: width 0.5s;
        }
    </style>
</head>
<body>

    <!-- Sabit Header -->
    <header class="fixed-header h-16 flex items-center justify-between px-4">
        <div class="flex items-center gap-2" onclick="app.navigate('gallery')">
            <div class="w-8 h-8 bg-[#00ff41] rounded flex items-center justify-center">
                <i class="fa-solid fa-bolt text-black"></i>
            </div>
            <span class="text-xl font-black tracking-tighter limevideo-gradient-text">LIMEVIDEO</span>
        </div>
        <nav class="flex gap-6 text-sm font-bold">
            <i class="fa-solid fa-house nav-link" id="nav-gallery" onclick="app.navigate('gallery')"></i>
            <i class="fa-solid fa-user nav-link" id="nav-user" onclick="app.navigate('user')"></i>
            <i class="fa-solid fa-right-to-bracket nav-link" id="nav-auth" onclick="app.navigate('auth')"></i>
        </nav>
    </header>

    <!-- Ana İçerik Alanı (SPA) -->
    <main id="app-root" class="page-content">
        <!-- Sayfalar buraya render edilecek -->
    </main>

    <!-- Sayfa Altı Loading Bar (Infinity Scroll simülasyonu için) -->
    <div id="scroll-loader" class="infinity-loader fixed bottom-0 left-0"></div>

    <script>
        /**
         * LimeVideo.js - Basit SPA Motoru & State Yönetimi
         */
        const app = {
            state: {
                currentPage: 'auth',
                user: null,
                videos: [
                    { id: 1, title: "LimeVideo UI Tasarım Rehberi", author: "Aiedrow", views: "1.2K", duration: "05:20" },
                    { id: 2, title: "Modern SPA Mimarisi", author: "DevLimeVideo", views: "850", duration: "12:15" },
                    { id: 3, title: "Yeşil ve Siyahın Gücü", author: "DesignX", views: "3.4K", duration: "03:45" },
                    { id: 4, title: "Mobile First Yaklaşımlar", author: "FrontendGuru", views: "2.1K", duration: "08:10" }
                ],
                comments: [
                    { id: 1, user: "Kullanıcı123", text: "Bu arayüz gerçekten çok hızlı görünüyor!", votes: 12 },
                    { id: 2, user: "LimeVideoFan", text: "Renk paleti harika olmuş.", votes: 5 }
                ]
            },

            init() {
                this.navigate('auth');
                this.setupInfiniteScroll();
            },

            navigate(page) {
                this.state.currentPage = page;
                this.render();
                window.scrollTo(0, 0);

                // Aktif link güncelleme
                document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
                const activeNav = document.getElementById(`nav-${page}`);
                if(activeNav) activeNav.classList.add('active');
            },

            render() {
                const root = document.getElementById('app-root');
                switch(this.state.currentPage) {
                    case 'auth': root.innerHTML = this.pages.auth(); break;
                    case 'gallery': root.innerHTML = this.pages.gallery(); break;
                    case 'video': root.innerHTML = this.pages.video(); break;
                    case 'user': root.innerHTML = this.pages.user(); break;
                }
            },

            // Sayfa Şablonları
            pages: {
                auth: () => `
                    <div class="flex flex-col items-center justify-center px-6 py-12 animate-fade-in">
                        <div class="w-full max-w-md p-8 limevideo-card">
                            <h2 class="text-3xl font-bold mb-6 text-center">Hoş Geldiniz</h2>
                            <div class="flex gap-4 mb-8">
                                <button class="flex-1 border-b-2 border-[#00ff41] pb-2 font-bold">Giriş Yap</button>
                                <button class="flex-1 border-b-2 border-transparent pb-2 text-gray-500">Kayıt Ol</button>
                            </div>
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-xs uppercase text-gray-500 mb-1">E-posta</label>
                                    <input type="email" class="limevideo-input" placeholder="user@limevideo.com">
                                </div>
                                <div>
                                    <label class="block text-xs uppercase text-gray-500 mb-1">Şifre</label>
                                    <input type="password" class="limevideo-input" placeholder="••••••••">
                                </div>
                                <button onclick="app.navigate('gallery')" class="w-full limevideo-btn-primary mt-4">Sisteme Gir</button>
                            </div>
                            <p class="text-center text-sm mt-6 text-gray-500">LimeVideo.js ile güvenli kimlik doğrulama.</p>
                        </div>
                    </div>
                `,

                gallery: () => `
                    <div class="p-4 animate-fade-in">
                        <div class="flex items-center justify-between mb-6">
                            <h1 class="text-2xl font-bold">Keşfet</h1>
                            <div class="flex gap-2">
                                <span class="bg-[#1a1a1a] p-2 rounded text-xs">Popüler</span>
                                <span class="bg-[#00ff41] p-2 rounded text-xs text-black font-bold">Yeni</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${app.state.videos.map(v => `
                                <div class="limevideo-card cursor-pointer group" onclick="app.navigate('video')">
                                    <div class="video-placeholder relative">
                                        <i class="fa-solid fa-play text-4xl opacity-0 group-hover:opacity-100 transition-opacity"></i>
                                        <span class="absolute bottom-2 right-2 bg-black/80 text-[10px] px-2 py-1 rounded">${v.duration}</span>
                                    </div>
                                    <div class="p-4">
                                        <h3 class="font-bold text-lg mb-1">${v.title}</h3>
                                        <div class="flex justify-between text-sm text-gray-500">
                                            <span>${v.author}</span>
                                            <span>${v.views} izlenme</span>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `,

                video: () => `
                    <div class="animate-fade-in">
                        <!-- Video Player Area -->
                        <div class="w-full bg-black aspect-video flex items-center justify-center border-b border-[#333]">
                            <div class="video-placeholder w-full h-full">
                                <i class="fa-solid fa-circle-play text-6xl text-[#00ff41]"></i>
                            </div>
                        </div>

                        <!-- Video Info -->
                        <div class="p-4">
                            <h1 class="text-xl font-bold mb-2">LimeVideo UI ile Modern Arayüzler Tasarlamak</h1>
                            <div class="flex items-center justify-between mb-6">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-green-500 to-black border border-[#00ff41]"></div>
                                    <div>
                                        <p class="font-bold text-sm">Aiedrow Labs</p>
                                        <p class="text-xs text-gray-500">1.2M Abone</p>
                                    </div>
                                </div>
                                <button class="bg-white text-black px-4 py-2 rounded-full text-sm font-bold">Abone Ol</button>
                            </div>

                            <div class="bg-[#1a1a1a] p-4 rounded-lg mb-8">
                                <p class="text-sm text-gray-300 leading-relaxed">
                                    Bu videoda LimeVideo.css'in sunduğu hafif bileşenleri ve mobil öncelikli tasarım prensiplerini inceliyoruz.
                                    Yeşil ve siyahın kontrastını kullanarak nasıl dikkat çekici UI'lar oluşturulur?
                                </p>
                            </div>

                            <!-- Comment Section -->
                            <div class="space-y-6">
                                <h3 class="font-bold border-b border-[#333] pb-2">Yorumlar (142)</h3>

                                <div class="relative">
                                    <textarea maxlength="250" class="limevideo-input h-24 resize-none pr-12" placeholder="Düşüncelerini paylaş..."></textarea>
                                    <button class="absolute bottom-3 right-3 text-[#00ff41]"><i class="fa-solid fa-paper-plane"></i></button>
                                </div>

                                <div id="comments-list" class="space-y-4">
                                    ${app.state.comments.map(c => `
                                        <div class="p-3 rounded-lg comment-box">
                                            <p class="text-xs font-bold text-[#00ff41] mb-1">@${c.user}</p>
                                            <p class="text-sm text-gray-300 mb-2">${c.text}</p>
                                            <div class="flex items-center gap-4 text-xs">
                                                <span class="cursor-pointer hover:text-[#00ff41]"><i class="fa-solid fa-arrow-up"></i> ${c.votes}</span>
                                                <span class="cursor-pointer hover:text-red-500"><i class="fa-solid fa-arrow-down"></i></span>
                                                <span class="text-gray-500">Yanıtla</span>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `,

                user: () => `
                    <div class="p-4 animate-fade-in">
                        <div class="flex flex-col items-center mb-8">
                            <div class="w-24 h-24 rounded-full bg-[#1a1a1a] border-2 border-[#00ff41] mb-4 flex items-center justify-center">
                                <i class="fa-solid fa-user text-4xl"></i>
                            </div>
                            <h2 class="text-2xl font-bold">LimeVideo Developer</h2>
                            <p class="text-gray-500 text-sm">Katılım: Nisan 2024</p>
                        </div>

                        <div class="flex gap-2 mb-6 overflow-x-auto pb-2 no-scrollbar">
                            <button class="bg-[#00ff41] text-black px-4 py-1 rounded-full text-sm font-bold whitespace-nowrap">Videolarım</button>
                            <button class="bg-[#1a1a1a] px-4 py-1 rounded-full text-sm font-bold whitespace-nowrap">Beğenilenler</button>
                            <button class="bg-[#1a1a1a] px-4 py-1 rounded-full text-sm font-bold whitespace-nowrap">Yorumlarım</button>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                             ${[1, 2, 3].map(i => `
                                <div class="limevideo-card aspect-video relative group overflow-hidden">
                                    <div class="video-placeholder h-full"></div>
                                    <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                        <i class="fa-solid fa-pen-to-square"></i>
                                    </div>
                                </div>
                             `).join('')}
                        </div>
                    </div>
                `
            },

            // Infinity Scroll Simülasyonu
            setupInfiniteScroll() {
                window.addEventListener('scroll', () => {
                    if (this.state.currentPage !== 'video' && this.state.currentPage !== 'gallery') return;

                    const scrollPercent = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
                    document.getElementById('scroll-loader').style.width = `${scrollPercent}%`;

                    if (window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 50) {
                        this.loadMoreContent();
                    }
                });
            },

            loadMoreContent() {
                // Burada API'den yeni JSON verisi çekilebilir
                console.log("Daha fazla içerik yükleniyor...");
                // Yeni veri gelmiş gibi yapıp state güncelleme ve sessiz render yapılabilir
            }
        };

        // Başlat
        window.onload = () => app.init();
    </script>

    <style>
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</body>
</html>
