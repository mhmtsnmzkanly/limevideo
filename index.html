<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LimeVideo Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <script id="turnstile-script" src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer onload="window.limevideoTurnstileReady && window.limevideoTurnstileReady()"></script>
</head>
<body>
    <!-- Global Loading Screen: full-page boot loader shown before the app shell is ready -->
    <div id="globalLoader">
        <div class="loader-logo">
            <div class="w-8 h-8 bg-[#00ff41] rounded-lg flex items-center justify-center">
                <i class="fa-solid fa-play text-black text-xs"></i>
            </div>
            <span>LIMEVIDEO</span>
        </div>
        <div class="global-spinner"></div>
        <p id="loadingTimeoutMessage">
            Loading is taking longer than expected.<br>
            There may be a connection issue.
        </p>
    </div>


    <div id="modal-age-verification-host"></div>

    <div id="status-toast" class="status-toast">
        <i id="status-icon" class="fa-solid"></i>
        <span id="status-message"></span>
    </div>

    <div id="modal-preroll-host"></div>
    <div id="modal-popunder-host"></div>

    <header class="fixed-header h-16 flex items-center justify-between px-4">
        <div class="flex items-center gap-2 cursor-pointer" data-action="navigate" data-to="/gallery">
            <div class="w-8 h-8 bg-[#00ff41] rounded flex items-center justify-center">
                <i class="fa-solid fa-bolt text-black"></i>
            </div>
            <span class="text-xl font-black tracking-tighter lime-gradient-text">LIMEVIDEO</span>
        </div>
        <nav id="navbar-dynamic" class="flex items-center gap-5"></nav>

        <div id="notification-panel" class="notification-panel">
            <div class="p-4 border-b border-[#2a2a2a] flex justify-between items-center">
                <span class="text-xs font-black uppercase tracking-widest">Notifications</span>
                <span class="text-[10px] text-[#00ff41] cursor-pointer" data-action="mark-notifications-read">Mark all read</span>
            </div>
            <div id="notification-list" class="max-h-[300px] overflow-y-auto"></div>
        </div>
    </header>

    <main id="app-root" class="page-content"></main>
    <div id="modal-edit-profile-host"></div>
    <div id="modal-upload-host"></div>
    <div id="scroll-loader" class="infinity-loader fixed bottom-0 left-0"></div>

    <div id="modal-report-host"></div>

    <div id="modal-chat-host"></div>

    <!-- Modal Template: age verification overlay for sensitive videos -->
    <template id="tpl-modal-age-verification">
        <div id="age-verification-overlay">
            <div class="age-card">
                <div class="mb-8">
                    <div class="w-16 h-16 bg-[#00ff41]/10 rounded-full flex items-center justify-center mx-auto mb-6">
                        <i class="fa-solid fa-triangle-exclamation text-[#00ff41] text-2xl"></i>
                    </div>
                    <h2 class="text-2xl font-bold mb-3 tracking-tight">Sensitive Content</h2>
                    <p class="text-gray-400 text-sm leading-relaxed">
                        This video is age-restricted according to our community guidelines. You must confirm you are over 18 to continue.
                    </p>
                </div>
                <div class="turnstile-captcha" data-turnstile-widget data-purpose="age"></div>
                <button id="btn-enter-age" class="age-btn-primary age-btn-disabled" disabled data-action="toggle-age" data-state="confirm">Yes, I am over 18</button>
                <button data-action="navigate" data-to="/gallery" class="w-full py-3 text-[11px] font-bold uppercase tracking-widest text-gray-500 hover:text-white transition-colors">Go Back</button>
            </div>
        </div>
    </template>

    <!-- Modal Template: preroll advertisement overlay -->
    <template id="tpl-modal-preroll">
        <div id="preroll" class="preroll-overlay">
            <span class="ad-label">ADVERTISEMENT</span>
            <div class="text-center">
                <i class="fa-solid fa-play-circle text-6xl text-[#00ff41] mb-4 animate-pulse"></i>
                <h2 id="preroll-title" class="text-2xl font-bold italic mb-2">SPONSORED VIDEO</h2>
                <p class="text-gray-500 text-sm" id="ad-timer">Video will start in 5 seconds...</p>
            </div>
            <button id="skip-btn" data-action="toggle-preroll" data-state="close" class="skip-ad-btn uppercase text-xs font-black tracking-widest">Skip Ad</button>
        </div>
    </template>

    <!-- Modal Template: popunder offer card -->
    <template id="tpl-modal-popunder">
        <div id="popunder" class="popunder-modal">
            <div class="flex justify-between items-start mb-3">
                <span class="pop-title text-[10px] font-bold text-[#00ff41] uppercase tracking-widest">Special Offer</span>
                <i class="fa-solid fa-xmark cursor-pointer text-gray-600 hover:text-white" data-action="toggle-popunder" data-state="close"></i>
            </div>
            <p class="pop-body text-xs text-gray-300 mb-4">Build your own platform in 10 minutes with LimeVideo API.</p>
            <button class="pop-cta w-full py-2 bg-[#00ff41] text-black text-[10px] font-bold uppercase rounded">Check Now</button>
        </div>
    </template>

    <!-- Modal Template: profile edit form -->
    <template id="tpl-modal-edit-profile">
        <div id="edit-modal" class="modal-overlay" data-action="toggle-edit-profile" data-state="close" data-self="1">
            <div class="modal-container">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-black uppercase italic tracking-tighter">Edit Profile</h3>
                    <i class="fa-solid fa-xmark cursor-pointer text-gray-500 hover:text-white" data-action="toggle-edit-profile" data-state="close"></i>
                </div>
                <div class="space-y-5">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-500 mb-1 block tracking-widest">Display Name</label>
                        <input id="edit-display-name" class="lime-input" placeholder="Creator display name">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-500 mb-1 block tracking-widest">Bio</label>
                        <textarea id="edit-bio" class="lime-input min-h-[120px] resize-none" placeholder="Tell people what you create..."></textarea>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-500 mb-1 block tracking-widest">Avatar URL</label>
                        <input id="edit-avatar-url" class="lime-input" placeholder="https://...">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-500 mb-1 block tracking-widest">Cover URL</label>
                        <input id="edit-cover-url" class="lime-input" placeholder="https://...">
                    </div>
                    <div class="pt-4 flex gap-3">
                        <button data-action="save-profile" class="flex-1 lime-btn-primary uppercase text-xs">Save</button>
                        <button data-action="toggle-edit-profile" data-state="close" class="flex-1 bg-transparent border border-gray-700 uppercase text-xs rounded-lg">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Modal Template: external video publish form -->
    <template id="tpl-modal-upload">
        <div id="upload-modal" class="upload-modal-overlay" data-action="toggle-upload" data-state="close" data-self="1">
            <div class="upload-modal-content">
                <div class="p-7 pb-4 flex justify-between items-start">
                    <div>
                        <h2 class="text-2xl font-black uppercase italic tracking-tighter">Upload Video</h2>
                        <p class="text-xs text-gray-500 font-semibold mt-1">Publish an external video to LimeVideo.</p>
                    </div>
                    <button type="button" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/5 transition-colors" data-action="toggle-upload" data-state="close">
                        <i class="fa-solid fa-xmark text-gray-400"></i>
                    </button>
                </div>

                <form id="upload-form" class="upload-modal-scroll" data-action="submit-upload">
                    <div class="space-y-8">
                        <section class="space-y-5">
                            <div class="upload-section-kicker"><span></span>Core Information</div>
                            <div>
                                <label class="upload-label">Title</label>
                                <input id="upload-title" type="text" required maxlength="200" placeholder="Enter a clear video title" class="upload-input">
                            </div>
                            <div>
                                <label class="upload-label">Description</label>
                                <textarea id="upload-description" maxlength="1000" placeholder="Tell viewers what this video is about..." class="upload-input h-24 resize-none"></textarea>
                            </div>
                            <div>
                                <label class="upload-label">Visibility</label>
                                <div class="upload-radio-card">
                                    <label><input type="radio" name="upload-visibility" value="public" checked> Public</label>
                                    <label><input type="radio" name="upload-visibility" value="private"> Private</label>
                                </div>
                            </div>
                        </section>

                        <section class="space-y-5">
                            <div class="upload-section-kicker"><span></span>Video Source</div>
                            <div class="upload-segmented-control">
                                <button type="button" class="upload-segment-btn ${app.state.uploadSource === 'local' ? 'active' : ''}" data-action="set-upload-source" data-value="local">Upload Video</button>
                                <button type="button" class="upload-segment-btn ${app.state.uploadSource === 'external' ? 'active' : ''}" data-action="set-upload-source" data-value="external">External Source</button>
                            </div>

                            <div id="upload-local-source" class="upload-source-panel ${app.state.uploadSource === 'local' ? '' : 'hidden'}">
                                <div class="upload-dropzone">
                                    <i class="fa-solid fa-cloud-arrow-up text-4xl text-white/20 mb-4"></i>
                                    <p class="text-sm font-bold">Local upload pipeline is not active yet.</p>
                                    <p class="text-[10px] text-gray-500 mt-2 font-semibold uppercase">Use External Source for now.</p>
                                </div>
                            </div>

                            <div id="upload-external-source" class="upload-source-panel ${app.state.uploadSource === 'external' ? '' : 'hidden'} space-y-4">
                                <div>
                                    <label class="upload-label">Playback URL</label>
                                    <input id="upload-playback-url" type="url" placeholder="https://example.com/video.mp4" class="upload-input">
                                </div>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label class="upload-label">Thumbnail URL</label>
                                        <input id="upload-thumbnail-url" type="url" placeholder="https://example.com/thumb.jpg" class="upload-input">
                                    </div>
                                    <div>
                                        <label class="upload-label">Duration (Seconds)</label>
                                        <input id="upload-duration" type="number" min="0" placeholder="320" class="upload-input">
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section class="space-y-4">
                            <div class="upload-section-kicker"><span></span>Tags</div>
                            <p class="text-[11px] text-gray-500">Choose categories from the database. Tags are not typed manually.</p>
                            <div id="upload-tags" class="flex flex-wrap gap-2">${tagsHtml}</div>
                        </section>

                        <section class="pt-4 border-t border-white/5 grid gap-4 md:grid-cols-2">
                            <label class="upload-toggle-row">
                                <input id="upload-sensitive" type="checkbox">
                                <span></span>
                                <div>
                                    <strong>Sensitive Content</strong>
                                    <small>Show age verification before watch.</small>
                                </div>
                            </label>
                            <label class="upload-toggle-row">
                                <input id="upload-disable-comments" type="checkbox">
                                <span></span>
                                <div>
                                    <strong>Disable Comments</strong>
                                    <small>Prevent new comments on this video.</small>
                                </div>
                            </label>
                        </section>
                    </div>

                    <div class="upload-modal-footer">
                        <button type="button" data-action="toggle-upload" data-state="close" class="text-xs font-black text-gray-500 uppercase hover:text-white transition-colors">Cancel</button>
                        <button type="submit" id="upload-submit-btn" class="upload-btn px-8 py-3 rounded-2xl text-xs flex items-center gap-3">
                            <i class="fa-solid fa-cloud-arrow-up"></i>
                            <span>Publish Video</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </template>

    <!-- Template Engine: one selectable upload tag from the database -->
    <template id="tpl-partial-upload-tag-pill">
        <button type="button" class="upload-tag-pill ${app.state.uploadSelectedTags.includes(tag.slug) ? 'selected' : ''}" data-action="toggle-upload-tag" data-value="${app.safeAttr(tag.slug)}">${tag.name}</button>
    </template>

    <!-- Modal Template: global community chat panel -->
    <template id="tpl-modal-chat">
        <div id="chat-modal" class="chat-modal-overlay" data-action="toggle-chat" data-state="close" data-self="1">
            <div class="chat-panel">
                <div id="chat-confirm-popup" class="chat-confirm-popup">
                    <div class="w-16 h-16 bg-[#00ff41]/10 rounded-2xl flex items-center justify-center mb-6">
                        <i class="fa-solid fa-shield-halved text-[#00ff41] text-2xl"></i>
                    </div>
                    <h3 class="text-xl font-black uppercase italic mb-2">Message Responsibility</h3>
                    <p class="text-sm text-gray-400 mb-8 max-w-xs">
                        You are responsible for the message you send. Do you agree to follow the community rules?
                    </p>
                    <div class="flex flex-col w-full gap-3">
                        <button data-action="confirm-chat" class="bg-[#00ff41] text-black w-full py-4 rounded-2xl font-black uppercase text-xs">Yes, Send (Enter / E)</button>
                        <button data-action="cancel-chat-confirm" class="text-gray-500 font-black uppercase text-[10px] tracking-widest hover:text-white transition-colors">No, Cancel (Esc / H)</button>
                    </div>
                </div>
                <div class="chat-header">
                    <div>
                        <div class="flex items-center gap-2">
                            <h2 class="text-lg font-black uppercase italic tracking-tighter">Global Chat</h2>
                            <span class="px-2 py-0.5 bg-[#00ff41]/10 text-[#00ff41] text-[9px] font-black rounded-full uppercase">Live</span>
                        </div>
                        <p class="text-[10px] text-gray-500 font-bold uppercase mt-1">Chat with the LimeVideo community.</p>
                    </div>
                    <button data-action="toggle-chat" data-state="close" class="w-10 h-10 rounded-full hover:bg-white/5 flex items-center justify-center transition-colors">
                        <i class="fa-solid fa-xmark text-gray-500"></i>
                    </button>
                </div>
                <div id="chat-messages" class="chat-messages"></div>
                <div class="chat-input-area">
                    <div class="flex items-end gap-3">
                        <textarea id="chat-input" maxlength="500" rows="1" placeholder="Write a message to the community..." class="chat-input-box" data-action="chat-input"></textarea>
                        <button data-action="queue-chat" class="w-12 h-12 bg-[#00ff41] text-black rounded-xl flex items-center justify-center transition-transform active:scale-90 shrink-0">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                    <div class="flex justify-between mt-3 px-1">
                        <span class="text-[9px] text-gray-600 font-bold uppercase tracking-wider">Enter sends, Shift + Enter adds a new line</span>
                        <span id="chat-char-count" class="text-[9px] text-gray-600 font-bold uppercase tracking-wider">0 / 500</span>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Modal Template: moderation report form for videos, comments and users -->
    <template id="tpl-modal-report">
        <div id="report-modal" class="report-modal-overlay" data-action="toggle-report" data-state="close" data-self="1">
            <div class="report-panel">
                <div class="report-header">
                    <div class="flex gap-4 min-w-0">
                        <div id="report-icon-box" class="report-icon-box">
                            <i class="fa-solid fa-circle-exclamation"></i>
                        </div>
                        <div class="min-w-0">
                            <div class="flex items-center gap-2">
                                <h2 class="text-xl font-black uppercase italic tracking-tighter">Report Content</h2>
                                <span id="report-target-badge" class="report-target-badge">Target</span>
                            </div>
                            <p class="text-[11px] text-gray-500 font-bold uppercase mt-1">Reports are reviewed by moderation team.</p>
                        </div>
                    </div>
                    <button data-action="toggle-report" data-state="close" class="report-close-btn">
                        <i class="fa-solid fa-xmark text-gray-500"></i>
                    </button>
                </div>

                <div class="report-body">
                    <div class="report-context-preview">
                        <p class="text-[9px] font-black uppercase text-white/20 tracking-widest mb-1">Target Object</p>
                        <p id="report-target-label" class="text-xs font-bold text-gray-300 truncate">Loading content info...</p>
                        <p class="text-[9px] text-gray-500 mt-2 italic font-semibold">This helps moderators review faster.</p>
                    </div>

                    <form id="report-form" class="space-y-5">
                        <div>
                            <label class="report-field-label">Reason</label>
                            <select id="report-reason" class="report-select" required data-action="report-reason">
                                <option value="" disabled selected>Select a reason</option>
                                <option value="spam">Spam or misleading</option>
                                <option value="harassment">Harassment or hate</option>
                                <option value="explicit">Sexual or explicit content</option>
                                <option value="violence">Violence or dangerous content</option>
                                <option value="copyright">Copyright issue</option>
                                <option value="self_harm">Self-harm or harmful behavior</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div>
                            <label class="report-field-label">Details</label>
                            <textarea id="report-details" class="report-textarea h-28 resize-none" placeholder="Add more context. Minimum 10 characters." maxlength="500" data-action="report-details"></textarea>
                            <div class="flex justify-between items-center mt-2 px-1">
                                <p id="report-warning" class="text-[9px] font-black uppercase text-red-500 opacity-0 transition-opacity">Enter at least 10 characters.</p>
                                <p id="report-char-count" class="text-[10px] font-black text-gray-600 uppercase tracking-widest">0 / 500</p>
                            </div>
                        </div>

                        <div class="report-responsibility-note">
                            <i class="fa-solid fa-circle-info text-[#00ff41]"></i>
                            <p>False reports may affect your account standing. Please be honest.</p>
                        </div>
                    </form>
                </div>

                <div class="report-footer">
                    <button type="button" data-action="toggle-report" data-state="close" class="report-cancel-btn">Cancel</button>
                    <button type="button" id="report-submit-btn" class="report-submit-btn" disabled data-action="submit-report">Submit Report</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Template Engine: guest navbar state -->
    <template id="tpl-partial-navbar-guest">
        <i class="fa-solid fa-house nav-link ${page === 'gallery' ? 'active' : ''}" data-action="navigate" data-to="/gallery"></i>
        <button data-action="navigate" data-to="/auth" class="text-xs font-bold uppercase tracking-widest border border-[#333] px-4 py-1.5 rounded-full hover:border-[#00ff41] transition-all">Login</button>
    </template>

    <!-- Template Engine: authenticated navbar state -->
    <template id="tpl-partial-navbar-user">
        <i class="fa-solid fa-house nav-link ${page === 'gallery' ? 'active' : ''}" data-action="navigate" data-to="/gallery"></i>
        <div class="relative">
            <i class="fa-solid fa-bell nav-link" data-action="toggle-notifications">
                ${notificationDotHtml}
            </i>
        </div>
        <button class="chat-trigger nav-link" data-action="toggle-chat" aria-label="Open global chat">
            <i class="fa-solid fa-comment-dots"></i>
            <span id="chat-unread-badge" class="unread-badge">${chatBadgeLabel}</span>
        </button>
        <button class="upload-nav-btn" data-action="toggle-upload" data-state="open">
            <i class="fa-solid fa-plus"></i>
            <span>Upload</span>
        </button>
        <div class="relative">
            <div class="w-8 h-8 rounded-full bg-[#1a1a1a] border border-[#333] flex items-center justify-center cursor-pointer hover:border-[#00ff41] transition-all overflow-hidden" data-action="toggle-dropdown" data-value="user">
                <i class="fa-solid fa-user-secret text-[#00ff41]"></i>
            </div>
            <div id="drop-user" class="nav-dropdown">
                <div class="p-3 border-b border-[#222] mb-1">
                    <p class="font-black text-sm italic">${me.username}</p>
                    <p class="text-[9px] text-gray-500 uppercase tracking-widest">User Profile</p>
                </div>
                <div class="dropdown-item cursor-pointer" data-action="navigate" data-to="/profile/${me.id}">
                    <i class="fa-solid fa-user"></i> My Profile
                </div>
                <div class="dropdown-item cursor-pointer" data-action="navigate" data-to="/settings">
                    <i class="fa-solid fa-sliders"></i> Settings
                </div>
                <div class="dropdown-item cursor-pointer text-red-400" data-action="logout">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </div>
            </div>
        </div>
    </template>

    <!-- Template Engine: one notification row -->
    <template id="tpl-partial-notification-item">
        <div data-action="navigate" data-to="${app.safeAttr(n.url || '/gallery')}" class="p-4 border-b border-white/5 flex gap-3 items-start hover:bg-white/5 transition-colors cursor-pointer ${app.isUnreadNotification(n) ? 'bg-[#00ff41]/5' : ''}">
            <div class="w-9 h-9 rounded-xl bg-[#111] flex items-center justify-center border border-white/5 text-[#00ff41]"><i class="${app.notificationIcon(n.type)}"></i></div>
            <div class="flex-1">
                <p class="text-[11px] text-gray-300 leading-normal mb-1 font-medium">${n.title}: ${n.body}</p>
                <span class="text-[9px] text-gray-600 font-black uppercase tracking-tighter">${n.created_at}</span>
            </div>
        </div>
    </template>

    <!-- Template Engine: small unread notification dot -->
    <template id="tpl-partial-notification-dot">
        <div class="notification-dot"></div>
    </template>

    <!-- Template Engine: notification panel empty state -->
    <template id="tpl-partial-notifications-empty">
        <div class="p-8 text-center text-gray-500 text-[10px] font-bold uppercase tracking-widest">No notifications</div>
    </template>

    <!-- Template Engine: global chat empty state -->
    <template id="tpl-partial-chat-empty">
        <div class="flex flex-col items-center justify-center h-full opacity-20">
            <i class="fa-solid fa-comments text-5xl mb-4"></i>
            <p class="text-xs font-bold uppercase">No messages yet. Send the first one.</p>
        </div>
    </template>

    <!-- Template Engine: one global chat message row -->
    <template id="tpl-partial-chat-message">
        <div class="message-row ${isOwn ? 'msg-own' : 'msg-other'} msg-animate">
            <div class="msg-info">
                <span>${message.display_name || message.username}</span>
                <span class="opacity-50">@${message.username}</span>
                <span>•</span>
                <span>${message.created_at}</span>
            </div>
            <div class="msg-bubble">${message.body}</div>
        </div>
    </template>

    <!-- Template Engine: route loading wrapper -->
    <template id="tpl-partial-route-loading">
        <div class="animate-fade-in max-w-[1700px] mx-auto px-4 md:px-8 lg:px-12">
            <div class="route-skeleton-grid ${page === 'watch' ? 'watch' : ''}">
                ${cards}
            </div>
        </div>
    </template>

    <!-- Template Engine: one loading skeleton card -->
    <template id="tpl-partial-skeleton-card">
        <div class="lime-card skeleton-card">
            <div class="skeleton-block skeleton-thumb"></div>
            <div class="skeleton-block skeleton-line wide"></div>
            <div class="skeleton-block skeleton-line"></div>
            <div class="skeleton-meta-row">
                <span class="skeleton-block skeleton-dot"></span>
                <span class="skeleton-block skeleton-pill"></span>
            </div>
        </div>
    </template>

    <!-- Template Engine: discovery video card -->
    <template id="tpl-partial-video-card">
        <div class="lime-card cursor-pointer group" data-action="navigate" data-to="/video/${v.id}">
            <div class="video-placeholder">
                ${thumbnailHtml}

                                <button data-action="watch-later" data-id="${v.id}" class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider hover:border-[#00ff41] transition-all"><i class="fa-regular fa-clock mr-2"></i>Later</button>
                                <button data-action="share-video" data-id="${v.id}" class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider hover:border-[#00ff41] transition-all"><i class="fa-solid fa-share-nodes mr-2"></i>Share</button>
                                <button data-action="toggle-report" data-state="open" data-type="video" data-id="${v.id}" data-label="${app.safeAttr(v.title || v.id)}" class="bg-white/5 border border-white/10 px-3 py-2 rounded-xl text-[11px] font-bold uppercase tracking-wider hover:border-red-400 transition-all"><i class="fa-regular fa-flag mr-2"></i>Report</button>
                            </div>
                        </div>
                        <div class="mt-6 p-4 bg-white/5 rounded-xl text-sm leading-relaxed text-gray-300">
                            <span class="font-bold text-white mr-2">${v.views || 0} Views • ${v.created_at || ''}</span>
                            ${v.description || 'No description provided.'}
                        </div>
                    </div>
                    <div class="lime-card p-6 flex flex-col gap-8">
                        <div class="flex items-center justify-between gap-3">
                            <h3 id="comments-count-label" class="text-sm font-bold uppercase tracking-widest text-gray-400">Comments (${v.comments_count || 0})</h3>
                            <div class="flex gap-2">
                                <button data-action="set-comment-sort" data-value="new" class="text-[10px] font-black uppercase px-3 py-1 rounded-lg ${app.state.commentSort === 'new' ? 'bg-[#00ff41] text-black' : 'bg-white/5 text-gray-500'}">New</button>
                                <button data-action="set-comment-sort" data-value="top" class="text-[10px] font-black uppercase px-3 py-1 rounded-lg ${app.state.commentSort === 'top' ? 'bg-[#00ff41] text-black' : 'bg-white/5 text-gray-500'}">Top</button>
                            </div>
                        </div>
                        ${commentFormHtml}
                        <div id="comments-list" class="space-y-10"></div>
                        <button id="load-more-comments" data-action="load-more-comments" data-id="${v.id}" class="text-[10px] font-black uppercase text-gray-500 py-3 hidden">Load More</button>
                    </div>
                </div>
                <div class="lg:col-span-4 flex flex-col gap-8">
                    ${playlistHtml}
                    <div class="flex items-center justify-between">
                        <h3 class="text-[10px] font-black text-gray-600 uppercase tracking-[0.2em] px-1">Up Next</h3>
                        <button data-action="toggle-autoplay" class="flex items-center gap-2">
                            <span class="text-[9px] font-bold text-gray-600 uppercase">Autoplay</span>
                            <span id="autoplay-toggle" class="w-9 h-5 rounded-full relative transition-colors ${app.state.autoplay ? 'bg-[#00ff41]' : 'bg-white/10'}">
                                <span id="autoplay-knob" class="absolute top-1 w-3 h-3 rounded-full transition-all ${app.state.autoplay ? 'right-1 bg-black' : 'left-1 bg-gray-500'}"></span>
                            </span>
                        </button>
                    </div>
                    <div class="space-y-3">
                        ${suggestionsHtml}
                        <div class="mt-4 p-6 bg-gradient-to-br from-[#00ff41]/5 to-transparent border border-dashed border-[#00ff41]/20 rounded-2xl text-center">
                            <span class="text-[8px] font-black text-[#00ff41] uppercase tracking-[0.3em] block mb-2">${sidebarAd.label || 'Sponsored'}</span>
                            <h5 class="text-[11px] font-bold uppercase mb-2">${sidebarAd.title || 'Upgrade to LimeVideo Pro'}</h5>
                            <p class="text-[9px] text-gray-500 leading-tight mb-4">${sidebarAd.body || 'Creator analytics and cleaner watch sessions.'}</p>
                            <button class="w-full py-2 border border-[#00ff41] text-[#00ff41] text-[9px] font-black uppercase rounded-lg hover:bg-[#00ff41] hover:text-black transition-all">${sidebarAd.cta_label || 'View Plans'}</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Template Engine: direct internal/external video source player -->
    <template id="tpl-partial-watch-direct-player">
        <video id="main-player" controls class="w-full h-full" poster="${posterUrl}"><source src="${sourceUrl}"></video>
    </template>

    <!-- Template Engine: external provider page fallback -->
    <template id="tpl-partial-watch-external-player">
        <div class="w-full h-full min-h-[360px] flex items-center justify-center bg-black/80">
            <div class="lime-card max-w-md text-center p-8">
                <p class="text-[10px] font-black uppercase tracking-[0.25em] text-[#00ff41]">External Player</p>
                <h3 class="text-2xl font-black mt-3">This video opens on its provider page.</h3>
                <p class="text-sm text-gray-400 mt-3">The source is not a direct video file, so LimeVideo will open it in a new tab.</p>
                <a href="${sourceUrl}" target="_blank" rel="noopener noreferrer" class="lime-btn-primary inline-flex mt-6 text-xs uppercase">Open Player</a>
            </div>
        </div>
    </template>

    <!-- Template Engine: one watch-page suggested video row -->
    <template id="tpl-partial-watch-suggestion-item">
        <div class="suggestion-card flex gap-4 group" data-action="navigate" data-to="/video/${vi.id}">
            <div class="w-32 aspect-video bg-[#050505] rounded-lg overflow-hidden flex-shrink-0 relative video-placeholder">
                ${thumbnailHtml}
                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center"><i class="fa-solid fa-play text-sm text-[#00ff41]"></i></div>
            </div>
            <div class="flex flex-col justify-center min-w-0">
                <h4 class="watch-line-clamp text-xs font-bold leading-snug group-hover:text-[#00ff41] transition-colors">${vi.title}</h4>
                <p class="text-[9px] text-gray-500 uppercase mt-1">${vi.username}</p>
                <p class="text-[9px] text-gray-600 font-bold">${vi.views || 0} views</p>
            </div>
        </div>
    </template>

    <!-- Template Engine: profile page shell and header -->
    <template id="tpl-page-user">
        <div class="animate-fade-in max-w-5xl mx-auto px-4">
            <div class="profile-shell mb-6">
                <div class="profile-cover-premium" style="${coverInlineStyle}"><div class="profile-cover-accent"></div></div>
                <div class="profile-identity">
                    <div class="flex flex-col md:flex-row md:items-end justify-between gap-8">
                        <div class="flex flex-col md:flex-row md:items-end gap-6 items-center md:items-end text-center md:text-left">
                            <div class="profile-avatar-stack shrink-0"><div class="profile-avatar-glow"></div><div class="profile-avatar-frame overflow-hidden">${avatarHtml}</div></div>
                            <div class="pt-4 md:pt-0">
                                <div class="flex items-center justify-center md:justify-start gap-2 mb-1"><h2 class="text-3xl md:text-4xl font-black italic uppercase tracking-tighter">${displayName}</h2><i class="fa-solid fa-circle-check text-[#00ff41] text-sm"></i></div>
                                <p class="text-gray-500 text-[11px] font-bold uppercase tracking-[0.28em] mb-3">@${u.username}</p>
                                <p class="text-sm text-gray-400 max-w-md leading-relaxed">${u.bio || 'LimeVideo platform creator. Sharing high performance UI and experimental video experiences.'}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 md:mb-1 justify-center md:justify-end">
                            <button data-action="share-profile" data-id="${u.id}" class="bg-white/5 border border-white/10 px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-[0.16em] hover:border-[#00ff41] transition-all">Share</button>
                            ${actionsHtml}
                        </div>
                    </div>
                    <div class="profile-metric-row">
                        <div class="profile-metric-item"><span class="profile-metric-value">${u.stats?.videos || 0}</span><span class="profile-metric-label">Videos</span></div>
                        <div class="profile-metric-item"><span class="profile-metric-value">${u.stats?.views || 0}</span><span class="profile-metric-label">Views</span></div>
                        <div class="profile-metric-item"><span class="profile-metric-value">${u.stats?.followers || 0}</span><span class="profile-metric-label">Followers</span></div>
                        <div class="profile-metric-item"><span class="profile-metric-value">${u.stats?.following || 0}</span><span class="profile-metric-label">Following</span></div>
                        <div class="profile-metric-item"><span class="profile-metric-value">${u.stats?.saved || 0}</span><span class="profile-metric-label">Saved</span></div>
                    </div>
                </div>
                <div class="profile-tabbar no-scrollbar">
                    <a href="#videos" class="profile-tab ${activeTab === '#videos' ? 'active' : ''}">Videos</a>
                    <a href="#saved" class="profile-tab ${activeTab === '#saved' ? 'active' : ''}">Saved</a>
                    <a href="#liked" class="profile-tab ${activeTab === '#liked' ? 'active' : ''}">Liked</a>
                    <a href="#comments" class="profile-tab ${activeTab === '#comments' ? 'active' : ''}">Comments</a>
                    <a href="#followers" class="profile-tab ${activeTab === '#followers' ? 'active' : ''}">Followers</a>
                    <a href="#following" class="profile-tab ${activeTab === '#following' ? 'active' : ''}">Following</a>
                    <a href="#about" class="profile-tab ${activeTab === '#about' ? 'active' : ''}">About</a>
                </div>
            </div>
            ${viewToggleHtml}
            ${tabHtml}
        </div>
    </template>

    <!-- Template Engine: comment composer shown when comments are enabled -->
    <template id="tpl-partial-comment-form">
        <div class="flex gap-4"><div class="w-10 h-10 rounded-xl bg-[#111] flex-shrink-0 border border-white/5 flex items-center justify-center"><i class="fa-solid fa-user text-xs text-gray-600"></i></div><div class="flex-1"><textarea id="comment-text" class="lime-input h-20 resize-none" placeholder="Add a comment..."></textarea><div class="flex justify-end mt-2"><button data-action="add-comment" class="text-[10px] font-bold uppercase tracking-widest text-[#00ff41] bg-[#00ff41]/10 px-5 py-2 rounded-lg">Send</button></div></div></div>
    </template>

    <!-- Template Engine: comment disabled state for videos with closed discussions -->
    <template id="tpl-partial-comments-disabled">
        <div class="rounded-2xl border border-white/10 bg-white/[0.03] p-5 flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl bg-[#00ff41]/10 text-[#00ff41] flex items-center justify-center">
                <i class="fa-solid fa-lock"></i>
            </div>
            <div>
                <p class="text-sm font-black uppercase tracking-tight text-white">Comments are disabled</p>
                <p class="text-xs text-gray-500 mt-1">This creator has closed new comments for this video.</p>
            </div>
        </div>
    </template>

    <!-- Template Engine: profile owner action buttons -->
    <template id="tpl-partial-profile-own-actions">
        <button data-action="toggle-edit-profile" data-state="open" class="lime-btn-primary px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-[0.16em]">Edit Profile</button>
    </template>

    <!-- Template Engine: profile visitor action buttons -->
    <template id="tpl-partial-profile-visitor-actions">
        <button data-action="follow-profile" data-id="${u.id}" class="lime-btn-primary px-8 py-3 rounded-xl text-[10px] font-black uppercase tracking-[0.16em]">${Number(u.is_following) ? 'Following' : 'Follow'}</button>
        <button data-action="toggle-report" data-state="open" data-type="user" data-id="${u.id}" data-label="${app.safeAttr(u.username || u.id)}" class="bg-white/5 border border-white/10 px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-[0.14em] hover:border-red-400 transition-all">Report</button>
    </template>

    <!-- Template Engine: profile grid/list view toggle -->
    <template id="tpl-partial-profile-view-toggle">
        <div class="flex justify-end gap-2 mb-4">
            <button data-action="set-profile-view" data-value="grid" class="text-[10px] font-black uppercase px-3 py-2 rounded-lg ${app.state.profileView === 'grid' ? 'bg-[#00ff41] text-black' : 'bg-white/5 text-gray-500'}"><i class="fa-solid fa-grip"></i></button>
            <button data-action="set-profile-view" data-value="list" class="text-[10px] font-black uppercase px-3 py-2 rounded-lg ${app.state.profileView === 'list' ? 'bg-[#00ff41] text-black' : 'bg-white/5 text-gray-500'}"><i class="fa-solid fa-list"></i></button>
        </div>
    </template>

    <script src="index.js"></script>
</body>
</html>
